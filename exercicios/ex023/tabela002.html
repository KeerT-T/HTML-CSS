<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        *{
            font-family: Helvetica, sans-serif;
        }
        body{
            background-color: rgb(255, 143, 143);
        }
        table{
            border: 1px solid black;
            border-collapse: collapse;
            width: 500px;
            text-align: center;
        }
        
        th{
            border: 1px solid black ;
            
        }
        td{
            border: 2px solid rgb(0, 26, 255);
            padding: 5px;   
        }
        thead, tfoot{
            background-color: antiquewhite;
        }
        tbody{
            background-color: black;
            color: white;
        }
        .numeracao{
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Uso de tabelas GRANDES</h1>
    <table>
        <thead>
            <th>Contagem</th>
            <th>Estado</th>
            <th>Hábitantes</th>
        </thead>
        <tbody>
            <tr>
               <td>1</td>
                <td>São Luís</td>
                <td class="numeracao">5.000.000</td>
        </tr>
        <tr>    
            <td>2</td>
            <td>Fortaleza</td>
            <td class="numeracao">6.900.000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Belém</td>
            <td class="numeracao">2.000.000</td>
        </tr>
        </tbody>
        <tfoot>
            <td>4</td>
            <th>Total de Habitantes</th>
            <td><strong>13.900.000</strong></td>
        </tfoot>
    </table>

</body>
</html>
