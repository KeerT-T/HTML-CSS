<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Weight Hover Animation</title>
    <style>
        .animated-text {
            font-size: 2rem;
            font-weight: 400;
            transition: font-weight 0.5s ease;
        }

        .animated-text:hover {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <p class="animated-text">Passe o mouse sobre mim!</p>
</body>
</html>
